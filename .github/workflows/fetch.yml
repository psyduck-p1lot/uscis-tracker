name: USCIS 821-D Daily Fetch

on:
  schedule:
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      ioe_start:
        description: "IOE suffix start (10 digits)"
        required: false
        default: ""
      ioe_end:
        description: "IOE suffix end (10 digits)"
        required: false
        default: ""

jobs:
  fetch-and-predict:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch_cases.py
        env:
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          IOE_START: ${{ github.event.inputs.ioe_start || secrets.IOE_START || '2490100001' }}
          IOE_END:   ${{ github.event.inputs.ioe_end   || secrets.IOE_END   || '2490100050' }}
        run: python fetch_cases.py

      - name: Run predict.py
        env:
          DATABASE_URL:       ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python predict.py
